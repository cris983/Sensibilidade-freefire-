<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensibilidade Free Fire PRO</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

    body{
      background: url('https://i.imgur.com/8QZ7Z7T.jpg') no-repeat center center/cover;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      position:relative;
    }

    /* camada escura por cima do fundo */
    body::before{
      content:"";
      position:absolute;
      width:100%;
      height:100%;
      background: rgba(2,6,23,0.85);
      z-index:0;
    }

    .card{
      position:relative;
      z-index:1;
      background: rgba(30,41,59,0.75);
      backdrop-filter: blur(20px);
      padding:25px;
      border-radius:20px;
      width:100%;
      max-width:420px;
      box-shadow: 0 0 50px rgba(0,255,150,0.2);
      border:1px solid rgba(34,197,94,0.3);
      animation: fadeIn 0.8s ease;
    }

    h2{
      margin-bottom:10px;
      font-size:22px;
      text-align:center;
      background: linear-gradient(90deg,#22c55e,#4ade80);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    p{margin-bottom:10px;color:#cbd5f5;font-size:14px;text-align:center}

    select,button{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:none;
      margin-top:10px;
      font-size:15px;
    }

    select{
      background:#020617;
      color:#fff;
      border:1px solid #334155;
    }

    button{
      background: linear-gradient(90deg,#22c55e,#16a34a);
      color:#fff;
      font-weight:bold;
      cursor:pointer;
      transition:0.25s;
      letter-spacing:1px;
    }

    button:hover{
      transform: scale(1.07);
      box-shadow:0 0 20px rgba(34,197,94,0.8);
    }

    .resultado{
      margin-top:20px;
      background: rgba(2,6,23,0.9);
      padding:15px;
      border-radius:12px;
      border:1px solid #22c55e;
      animation: fadeIn 0.5s ease;
      box-shadow:0 0 15px rgba(34,197,94,0.3);
    }

    .resultado h3{
      margin-bottom:10px;
      color:#4ade80;
      text-align:center;
    }

    .resultado p{
      margin:6px 0;
      font-size:14px;
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid rgba(255,255,255,0.05);
      padding-bottom:4px;
    }

    /* detalhe estilo HUD gamer */
    .card::after{
      content:"";
      position:absolute;
      top:-2px;
      left:-2px;
      right:-2px;
      bottom:-2px;
      border-radius:20px;
      border:2px solid rgba(34,197,94,0.2);
      pointer-events:none;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(15px)}
      to{opacity:1; transform:translateY(0)}
    }
  </style>
</head>

<body>

<div class="card">
  <h2>🔥 Sensibilidade Automática</h2>
  <p>Escolha a marca do seu celular:</p>

  <select id="marca">
    <option value="">Selecione a marca</option>
    <option>Samsung</option>
    <option>Xiaomi</option>
    <option>Motorola</option>
    <option>Apple</option>
    <option>Huawei</option>
    <option>Realme</option>
    <option>Oppo</option>
    <option>Vivo</option>
    <option>Asus</option>
    <option>Lenovo</option>
    <option>LG</option>
    <option>Sony</option>
    <option>Nokia</option>
    <option>Infinix</option>
    <option>Tecno</option>
    <option>OnePlus</option>
    <option>Google Pixel</option>
    <option>ZTE</option>
    <option>Honor</option>
    <option>Blackview</option>
    <option>Doogee</option>
    <option>Umidigi</option>
    <option>Meizu</option>
    <option>Alcatel</option>
    <option>Sharp</option>
    <option>HTC</option>
    <option>Panasonic</option>
    <option>Philips</option>
    <option>Coolpad</option>
    <option>Micromax</option>
    <option>Lava</option>
    <option>Karbonn</option>
    <option>BLU</option>
    <option>Fairphone</option>
    <option>Cat</option>
    <option>Kyocera</option>
    <option>Wiko</option>
    <option>Archos</option>
    <option>BQ</option>
    <option>Prestigio</option>
    <option>Gionee</option>
    <option>LeEco</option>
    <option>Yota</option>
    <option>Razer</option>
    <option>Red Hydrogen</option>
    <option>Essential</option>
    <option>Nothing</option>
    <option>iQOO</option>
    <option>ROG Phone</option>
  </select>

  <button onclick="gerar()">GERAR SENSIBILIDADE</button>
  <button onclick="gerar()">GERAR OUTRA 🔄</button>

  <div class="resultado" id="res"></div>
</div>

<script>
function gerar(){
  const marca = document.getElementById('marca').value;

  if(!marca){alert('Escolhe a marca!'); return;}

  let base = Math.floor(Math.random()*20)+170;

  let sens = {
    geral: base,
    redDot: base - Math.floor(Math.random()*15),
    mira2x: base - Math.floor(Math.random()*30),
    mira4x: base - Math.floor(Math.random()*10),
    awm: Math.floor(Math.random()*40)+20,
    dpi: 600 + Math.floor(Math.random()*400)
  };

  if(marca === 'Apple'){
    sens.geral -= 10;
    sens.redDot -= 10;
  }

  if(marca === 'Samsung' || marca === 'Xiaomi'){
    sens.geral += 5;
  }

  document.getElementById('res').innerHTML = `
    <h3>📱 ${marca}</h3>
    <p><span>🎯 Geral</span><span>${sens.geral}</span></p>
    <p><span>🔴 Ponto Vermelho</span><span>${sens.redDot}</span></p>
    <p><span>🔎 Mira 2x</span><span>${sens.mira2x}</span></p>
    <p><span>🔭 Mira 4x</span><span>${sens.mira4x}</span></p>
    <p><span>🎯 AWM</span><span>${sens.awm}</span></p>
    <p><span>⚙️ DPI</span><span>${sens.dpi}</span></p>
  `;
}
</script>

</body>
  </html>
